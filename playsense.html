<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PlaySense — Know Before You Watch</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  /* ─── TOKENS ─── */
  :root {
    --black:       #000000;
    --surface:     #080808;
    --surface-2:   #0e0e0e;
    --border:      #1a1a1a;
    --border-glow: #2a2a2a;
    --lime:        #B0FF00;
    --lime-dim:    rgba(176,255,0,0.12);
    --lime-glow:   rgba(176,255,0,0.35);
    --purple:      #9D4DFF;
    --purple-dim:  rgba(157,77,255,0.12);
    --purple-glow: rgba(157,77,255,0.35);
    --cyan:        #00E5FF;
    --cyan-dim:    rgba(0,229,255,0.10);
    --cyan-glow:   rgba(0,229,255,0.30);
    --white:       #FFFFFF;
    --grey:        #888888;
    --grey-dim:    #333333;
    --font-head:   'Orbitron', monospace;
    --font-body:   'DM Mono', monospace;
    --r-sm:        4px;
    --r-md:        8px;
    --r-pill:      999px;
  }

  /* ─── RESET ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── GRID BG ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.45;
    pointer-events: none;
  }

  /* ─── SCANLINE OVERLAY ─── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  /* ─── LAYOUT ─── */
  .page {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ─── HERO ─── */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 100px 0 64px;
  }

  .logo-mark {
    width: 48px;
    height: 48px;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.1s forwards;
  }

  .hero-title {
    font-family: var(--font-head);
    font-size: clamp(48px, 9vw, 88px);
    font-weight: 900;
    letter-spacing: 0.12em;
    line-height: 1;
    color: var(--white);
    opacity: 0;
    animation: fadeUp 0.7s ease 0.2s forwards;
  }

  .hero-title span {
    color: var(--lime);
    text-shadow: 0 0 40px var(--lime-glow), 0 0 80px rgba(176,255,0,0.15);
  }

  .hero-sub {
    margin-top: 20px;
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--grey);
    letter-spacing: 0.05em;
    max-width: 420px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.35s forwards;
  }

  /* ─── SEARCH ─── */
  .search-wrap {
    width: 100%;
    max-width: 620px;
    margin-top: 48px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.5s forwards;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border-glow);
    border-radius: var(--r-md);
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .search-box:focus-within {
    border-color: var(--lime);
    box-shadow: 0 0 0 1px var(--lime), 0 0 24px var(--lime-glow);
  }

  .search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 18px 20px;
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--white);
    letter-spacing: 0.03em;
  }

  .search-input::placeholder { color: var(--grey-dim); }

  .search-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 18px 28px;
    background: var(--lime);
    border: none;
    cursor: pointer;
    font-family: var(--font-head);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--black);
    transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .search-btn:hover {
    background: #ccff33;
    box-shadow: 0 0 20px var(--lime-glow);
  }

  .search-btn:active { transform: scale(0.97); }

  .search-btn svg { width: 14px; height: 14px; }

  /* ─── STATUS PILLS ─── */
  .status {
    margin-top: 24px;
    min-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Loading dots */
  .dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--lime);
    animation: blink 1.1s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.18s; }
  .dots span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.15; transform: scale(0.85); }
    40%            { opacity: 1;    transform: scale(1.1); }
  }

  .status-text {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--grey);
  }

  .status-error {
    font-size: 12px;
    letter-spacing: 0.06em;
    color: #ff4d6a;
    border: 1px solid rgba(255,77,106,0.3);
    background: rgba(255,77,106,0.06);
    padding: 6px 14px;
    border-radius: var(--r-pill);
  }

  /* ─── RESULTS ─── */
  .results {
    margin-top: 64px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .results.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .movie-title-bar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  .movie-title-bar h2 {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--grey);
    text-transform: uppercase;
  }

  .movie-title-bar .divider {
    flex: 1;
    height: 1px;
    background: var(--border-glow);
  }

  /* ─── CARD ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border-glow);
    border-radius: var(--r-md);
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: var(--r-md) var(--r-md) 0 0;
  }

  .card.visual   { --accent: var(--lime);   --accent-dim: var(--lime-dim);   --accent-glow: var(--lime-glow); }
  .card.substance{ --accent: var(--purple); --accent-dim: var(--purple-dim); --accent-glow: var(--purple-glow); }
  .card.words    { --accent: var(--cyan);   --accent-dim: var(--cyan-dim);   --accent-glow: var(--cyan-glow); }

  .card::before  { background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
  .card:hover    { border-color: var(--accent); box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 20%, transparent); }

  .card-icon {
    width: 32px;
    height: 32px;
    border-radius: var(--r-sm);
    background: var(--accent-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }

  .card-icon svg {
    width: 16px;
    height: 16px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .card-label {
    font-family: var(--font-head);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 5px 12px;
    border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
    border-radius: var(--r-pill);
    background: var(--accent-dim);
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--accent);
    white-space: nowrap;
    transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    cursor: default;
  }

  .tag:hover {
    background: color-mix(in srgb, var(--accent) 20%, transparent);
    box-shadow: 0 0 10px var(--accent-glow);
    transform: scale(1.04);
  }

  .no-warnings {
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--grey-dim);
    padding: 4px 0;
  }

  /* ─── FOOTER ─── */
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px 0 20px;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--grey-dim);
  }

  footer strong { color: var(--grey); font-weight: 400; }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .hero { padding: 70px 0 48px; }
    .results { grid-template-columns: 1fr; }
    .search-btn span { display: none; }
    .search-btn { padding: 18px 20px; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- HERO -->
  <header class="hero">

    <!-- Logo SVG -->
    <svg class="logo-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="46" height="46" rx="6" stroke="#B0FF00" stroke-width="1.5"/>
      <path d="M14 34V14l20 10-20 10Z" fill="#B0FF00"/>
      <circle cx="34" cy="14" r="4" fill="#9D4DFF"/>
      <circle cx="34" cy="34" r="4" fill="#00E5FF"/>
    </svg>

    <h1 class="hero-title">PLAY<span>SENSE</span></h1>
    <p class="hero-sub">Instantly see what's inside the movie before you press play.</p>

    <!-- SEARCH -->
    <div class="search-wrap">
      <div class="search-box">
        <input
          class="search-input"
          id="searchInput"
          type="text"
          placeholder="Enter a movie title..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="search-btn" id="searchBtn" aria-label="Search">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="6.5" cy="6.5" r="5"/>
            <line x1="10.5" y1="10.5" x2="14" y2="14"/>
          </svg>
          <span>SCAN</span>
        </button>
      </div>
      <div class="status" id="status"></div>
    </div>

  </header>

  <!-- RESULTS -->
  <section class="results" id="results" aria-live="polite"></section>

</div>

<!-- FOOTER -->
<footer>
  <strong>PlaySense</strong> &bull; AI-powered movie content analysis
</footer>

<script>
  /* ─── CONFIG ─── */
  const API_BASE = 'http://127.0.0.1:8000/movie?name=';

  /* ─── DOM ─── */
  const input   = document.getElementById('searchInput');
  const btn     = document.getElementById('searchBtn');
  const status  = document.getElementById('status');
  const results = document.getElementById('results');

  /* ─── ICON PATHS ─── */
  const icons = {
    Visual: `<polyline points="1 6 1 1 6 1"/><polyline points="10 1 15 1 15 6"/>
             <polyline points="15 10 15 15 10 15"/><polyline points="6 15 1 15 1 10"/>
             <circle cx="8" cy="8" r="3"/>`,
    Substance: `<path d="M6 2h4v4l2 2v8H4v-8l2-2V2z"/>
                <line x1="6" y1="2" x2="10" y2="2"/>
                <line x1="8" y1="10" x2="8" y2="14"/>`,
    Words: `<path d="M2 4h12v8H2z"/><line x1="5" y1="8" x2="11" y2="8"/>
            <line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="10" x2="8" y2="10"/>
            <polyline points="12 12 14 14 12 16"/>`,
  };

  const cardClass = { Visual: 'visual', Substance: 'substance', Words: 'words' };
  const displayNames = { Visual: 'Visual Content', Substance: 'Substance Use', Words: 'Language' };

  /* ─── HELPERS ─── */
  function setStatus(type, msg) {
    if (type === 'loading') {
      status.innerHTML = `<div class="dots"><span></span><span></span><span></span></div>
                          <span class="status-text" style="margin-left:10px;letter-spacing:.1em;font-size:11px;color:var(--grey)">SCANNING DATABASE</span>`;
    } else if (type === 'error') {
      status.innerHTML = `<span class="status-error">${msg}</span>`;
    } else {
      status.innerHTML = `<span class="status-text">${msg || ''}</span>`;
    }
  }

  function buildResults(data) {
    const cats = data.categories || {};
    const order = ['Visual', 'Substance', 'Words'];

    let html = `<div class="movie-title-bar">
      <h2 style="color:var(--grey)">CONTENT ANALYSIS</h2>
      <div class="divider"></div>
    </div>`;

    order.forEach(key => {
      const items = cats[key] || [];
      const cls   = cardClass[key] || 'visual';
      const label = displayNames[key] || key;
      const ico   = icons[key] || icons.Words;

      const tagsHtml = items.length
        ? items.map(t => `<span class="tag">${t}</span>`).join('')
        : `<span class="no-warnings">No warnings detected.</span>`;

      html += `
        <div class="card ${cls}">
          <div class="card-icon">
            <svg viewBox="0 0 16 16">${ico}</svg>
          </div>
          <div class="card-label">${label}</div>
          <div class="tag-list">${tagsHtml}</div>
        </div>`;
    });

    return html;
  }

  /* ─── SEARCH ─── */
  async function search() {
    const q = input.value.trim();
    if (!q) {
      input.focus();
      return;
    }

    results.classList.remove('visible');
    results.innerHTML = '';
    setStatus('loading');
    btn.disabled = true;

    try {
      const res = await fetch(`${API_BASE}${encodeURIComponent(q)}`);
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const data = await res.json();

      results.innerHTML = buildResults(data);
      setStatus('clear');

      // Stagger cards
      document.querySelectorAll('.card').forEach((c, i) => {
        c.style.opacity = '0';
        c.style.transform = 'translateY(14px)';
        c.style.transition = `opacity 0.4s ease ${i * 0.1}s, transform 0.4s ease ${i * 0.1}s`;
      });

      requestAnimationFrame(() => {
        results.classList.add('visible');
        document.querySelectorAll('.card').forEach(c => {
          c.style.opacity = '1';
          c.style.transform = 'translateY(0)';
        });
      });

    } catch (err) {
      setStatus('error', `⚠ Could not retrieve data — ${err.message}`);
      results.innerHTML = '';
    } finally {
      btn.disabled = false;
    }
  }

  /* ─── EVENTS ─── */
  btn.addEventListener('click', search);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
</script>

</body>
</html>
